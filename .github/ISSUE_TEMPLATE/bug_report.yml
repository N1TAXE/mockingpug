name: Bug report
description: Something in mockingpug doesn't work as documented
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect, and what did you get instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: >
        The schema (or relevant part of it), the command you ran
        (`mpug doctor`, `mpug generate`, a request against your dev server,
        etc.), and the exact output/error.
      render: shell
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: mockingpug version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - mockingpug/react (MSW)
        - mockingpug/next
        - mockingpug/vite
        - CLI only
        - Not transport-specific
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "20.x"
