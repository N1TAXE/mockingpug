name: Feature request
description: Suggest something mockingpug should do
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you unable to do today, or what's awkward about the current API?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the schema/API/CLI look like? A rough sketch is fine.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you're using today, or other approaches you considered.
